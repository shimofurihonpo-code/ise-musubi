name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: List Pages projects
        run: npx wrangler pages project list 2>&1 | tee /tmp/projects.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=ise-musubi --branch=main 2>&1 | tee /tmp/deploy_output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post output to GitHub issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PROJECTS=$(cat /tmp/projects.txt 2>/dev/null || echo "N/A")
          DEPLOY=$(cat /tmp/deploy_output.txt 2>/dev/null || echo "N/A")
          python3 -c "
import json, urllib.request, os
body = 'Projects:\n\`\`\`\n' + os.environ['PROJECTS'] + '\n\`\`\`\n\nDeploy:\n\`\`\`\n' + os.environ['DEPLOY'] + '\n\`\`\`'
data = json.dumps({'title': 'Deploy log', 'body': body}).encode()
req = urllib.request.Request(
  'https://api.github.com/repos/' + os.environ['REPO'] + '/issues',
  data=data,
  headers={'Authorization': 'token ' + os.environ['GH_TOKEN'], 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'}
)
urllib.request.urlopen(req)
print('Issue created')
" PROJECTS="$PROJECTS" DEPLOY="$DEPLOY"
