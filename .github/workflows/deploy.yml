name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Create project if not exists
        run: |
          npx wrangler pages project create ise-musubi --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy . --project-name=ise-musubi --branch=main 2>&1 | tee /tmp/deploy.txt
          cat /tmp/deploy.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save deploy log
        if: always()
        run: |
          cp /tmp/deploy.txt deploy-log.txt 2>/dev/null || echo "no deploy output" > deploy-log.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add deploy-log.txt
          git diff --cached --quiet || git commit -m "Deploy log [skip ci]"
          git push
