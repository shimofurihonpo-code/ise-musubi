name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: List Pages projects and deploy
        run: |
          echo "=== PROJECTS ===" > deploy-log.txt
          npx wrangler pages project list 2>&1 >> deploy-log.txt || true
          echo "=== DEPLOY ===" >> deploy-log.txt
          npx wrangler pages deploy . --project-name=ise-musubi --branch=main 2>&1 >> deploy-log.txt
          cat deploy-log.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Save log to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add deploy-log.txt
          git diff --cached --quiet || git commit -m "Deploy log [skip ci]"
          git push
