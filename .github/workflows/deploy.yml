name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy . --project-name=ise-musubi --branch=main 2>&1 | tee /tmp/deploy_output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post deploy output to GitHub issue
        if: always()
        run: |
          OUTPUT=$(cat /tmp/deploy_output.txt 2>/dev/null | head -80 || echo "No output file")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "$(jq -n --arg body "Deploy output:\n\`\`\`\n$OUTPUT\n\`\`\`" '{"title":"Deploy output log","body":$body}')"
